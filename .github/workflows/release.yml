# ---------------------------------------------------------------------------
# Release pipeline — M-Install Checkpoint 3a (image scope).
#
# Triggered on `release: published`. Builds the kitchen-sink all-EPs Docker
# image (same FEATURES set as the .github/workflows/ci.yml `docker-all-eps`
# job) and pushes it to GHCR as:
#
#   ghcr.io/<owner>/nexus-engine:vX.Y.Z   (the literal release tag)
#   ghcr.io/<owner>/nexus-engine:<sha>    (the commit sha, immutable)
#   ghcr.io/<owner>/nexus-engine:latest   (always rolls forward — pin to a
#                                          specific vX.Y.Z in prod)
#
# Why `release: published` and not `push: tags`:
#   The image bakes in the default model pack (yolo26n_dynamic.onnx,
#   yolo_world_v2_s.onnx, models-manifest.json) which is gitignored. We
#   ship those files as **GitHub Release assets** attached to the same
#   tag, and the "stage model pack" step below `gh release download`s
#   them into `models/` before `docker build`. Using `release: published`
#   guarantees the assets are present when the workflow runs — a plain
#   `push: tags` would race the asset upload (`gh release create` pushes
#   the tag *before* uploading assets, so a workflow keyed on tag-push
#   starts against an asset-less release and the download step fails).
#
# To cut a release:
#   gh release create vX.Y.Z --target main \
#     --title "vX.Y.Z" --generate-notes \
#     models/yolo26n_dynamic.onnx \
#     models/yolo_world_v2_s.onnx \
#     models/yoloe26_s.onnx \
#     models/models-manifest.json
#
# Why this is its own workflow and not a job under ci.yml: the push needs
# `packages: write` (which ci.yml deliberately doesn't grant on PRs) and a
# different trigger. Keeping them split means a broken release workflow
# can never block PR iteration.
#
# Two jobs:
#   * image   — builds + pushes ghcr.io/<owner>/nexus-engine:vX.Y.Z et al
#               (original M-Install Checkpoint 3a scope).
#   * tarball — assembles nexus-edge-vX.Y.Z-linux-x86_64.tar.gz (binaries
#               + UI dist + ORT-OpenVINO libs + models pack + tier
#               templates + systemd unit + install.sh) and attaches it
#               to the GitHub Release alongside its .sha256 sidecar and
#               a top-level install.sh bootstrap (M-Install Checkpoint
#               3a.2). install.sh / bootstrap.sh live in scripts/ in
#               the repo for review; they are copied byte-for-byte
#               into the tarball at build time.
# ---------------------------------------------------------------------------

name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)publish (e.g. v0.1.0). The GitHub Release with this tag must already exist *with* the three model assets attached."
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: build + push GHCR image
    runs-on: ubuntu-22.04
    env:
      # On release: published, github.event.release.tag_name is set.
      # On workflow_dispatch, the operator supplies inputs.tag explicitly.
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_dispatch, allow re-publishing a previous tag.
          # On release events, github.ref is already refs/tags/<tag>.
          ref: ${{ github.event.inputs.tag || github.ref }}

      # ----------------------------------------------------------------
      # Stage the default model pack from the release's own assets.
      # The three files are gitignored (see .gitignore: /models/*), so
      # they have to be materialised into the build context BEFORE the
      # `COPY models/ /usr/share/nexus/models/` line in deploy/Dockerfile
      # runs. Without this step the image would build (Dockerfile copies
      # whatever is in `models/`, which is just `.gitkeep` post-checkout)
      # but ship with no inference weights — defeating the "fresh docker
      # compose up works" promise documented inline in deploy/Dockerfile.
      # ----------------------------------------------------------------
      - name: stage model pack from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p models
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'yolo26n_dynamic.onnx' \
            --pattern 'yolo_world_v2_s.onnx' \
            --pattern 'yoloe26_s.onnx' \
            --pattern 'models-manifest.json' \
            --dir models/
          echo "Staged model pack:"
          ls -la models/
          # Fail loudly (rather than silently shipping a no-weights image)
          # if any of the required files is missing.
          for f in yolo26n_dynamic.onnx yolo_world_v2_s.onnx yoloe26_s.onnx models-manifest.json; do
            if [ ! -s "models/$f" ]; then
              echo "::error::Required model asset 'models/$f' missing from release $TAG. Re-upload via 'gh release upload $TAG models/$f'."
              exit 1
            fi
          done

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nexus-engine
          # Use the resolved $TAG env (works for both `release: published`
          # and `workflow_dispatch`) rather than `type=ref,event=tag` —
          # the latter resolves to empty on workflow_dispatch where
          # github.ref is `refs/heads/main`.
          tags: |
            type=raw,value=${{ env.TAG }}
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: build + push (all-EPs, gha cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Kitchen sink — same FEATURES set as ci.yml `docker-all-eps`
          # so the released image is a superset of every tier's needs.
          # Drop EPs one at a time only if a release-blocker surfaces.
          # `gstreamer` is mandatory — without it the engine fails loud
          # on any `rtsp://` / `youtube://` URL via the fail-loud branch
          # in nexus-pipeline::supervisor (see v0.1.4 release notes).
          build-args: |
            FEATURES=gstreamer,ort,ep-cpu,ep-openvino,ep-cuda,ep-tensorrt
          # Reuse the docker-all-eps gha cache scope — first release on
          # a branch warm-starts from the most recent CI build of the
          # same scope, cuts ~15 min off cold publishing.
          cache-from: type=gha,scope=docker-all-eps
          cache-to: type=gha,scope=docker-all-eps,mode=max

  # -------------------------------------------------------------------------
  # tarball — M-Install Checkpoint 3a.2 / 3b
  #
  # Builds a self-contained bare-metal release tarball:
  #
  #   nexus-edge-vX.Y.Z-linux-x86_64.tar.gz
  #   ├── VERSION                         (just "vX.Y.Z\n")
  #   ├── MANIFEST.json                   (every file + sha256)
  #   ├── bin/
  #   │   ├── nexus-engine                (FEATURES=gstreamer,ort,ep-cpu,
  #   │   │                                ep-openvino,ep-cuda,ep-tensorrt)
  #   │   ├── nexus-probe
  #   │   └── nexus-doctor
  #   ├── lib/onnxruntime/                (libonnxruntime.so + OpenVINO
  #   │                                    EP + intel CPU/GPU/NPU plugins,
  #   │                                    extracted from the wheel — same
  #   │                                    layout the docker runtime uses)
  #   ├── share/
  #   │   ├── ui/                         (ui/dist/)
  #   │   └── models/                     (default 4-file model pack)
  #   ├── etc-templates/
  #   │   ├── nexus.example.toml
  #   │   ├── tiers/{t10,t24,t36,t36s,t64}.toml
  #   │   └── systemd/nexus-engine.service
  #   └── scripts/
  #       ├── install.sh                  (in-tarball installer)
  #       ├── uninstall.sh
  #       └── lib/install-common.sh
  #
  # Outputs three release assets:
  #   * the tarball itself
  #   * <tarball>.sha256 (sha256sum format)
  #   * install.sh       (= scripts/bootstrap.sh, lets operators do
  #                        `curl -fsSL ...release/.../install.sh | sudo bash`)
  #
  # No Ed25519 signing yet — that's a follow-up PR that prepends a
  # signature step before "attach to release" and slots verification
  # into scripts/install.sh next to verify_sha256().  Sha256 + GitHub
  # Release HTTPS gets us most of the way; signing closes the
  # MITM / compromised-uploader gap.
  # -------------------------------------------------------------------------
  tarball:
    name: build + attach bare-metal tarball
    runs-on: ubuntu-22.04
    needs: image    # cheap dependency: forces serial execution so a
                    # failed image build aborts the workflow before
                    # burning ~15 min of compile time on the tarball.
    env:
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      ORT_VERSION: "1.22.0"
      FEATURES: "gstreamer,ort,ep-cpu,ep-openvino,ep-cuda,ep-tensorrt"
    permissions:
      contents: write   # required to `gh release upload`
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Same model-pack stage as the image job — release assets are
      # the source of truth, we don't keep the .onnx files in git.
      - name: stage model pack from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p models
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'yolo26n_dynamic.onnx' \
            --pattern 'yolo_world_v2_s.onnx' \
            --pattern 'yoloe26_s.onnx' \
            --pattern 'models-manifest.json' \
            --dir models/
          for f in yolo26n_dynamic.onnx yolo_world_v2_s.onnx yoloe26_s.onnx models-manifest.json; do
            test -s "models/$f" || { echo "::error::missing models/$f"; exit 1; }
          done

      # GStreamer + ORT headers for the cargo build.  Same package set
      # as deploy/Dockerfile stage 2 (rust-build).
      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential cmake \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-libav gstreamer1.0-tools \
            libssl-dev jq

      - name: install ONNX Runtime ${{ env.ORT_VERSION }} (for cargo link)
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt
          sudo mv "/opt/onnxruntime-linux-x64-${ORT_VERSION}" /opt/onnxruntime

      - uses: dtolnay/rust-toolchain@stable
        with:
          # rust-toolchain.toml pins the channel; this just makes sure
          # rustup is on PATH and cached.
          components: ""

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tarball-${{ env.FEATURES }}

      - name: cargo build (release, all EPs)
        env:
          ORT_LIB_LOCATION: /opt/onnxruntime/lib
        run: |
          set -euo pipefail
          cargo build --release -p nexus-engine \
            --features "$FEATURES" \
            --bin nexus-engine --bin nexus-doctor
          cargo build --release -p nexus-probe --bin nexus-probe

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: build UI
        run: |
          set -euo pipefail
          cd ui
          npm ci --no-fund --no-audit
          npm run build

      # Pull the OpenVINO-enabled libonnxruntime.so (and the intel
      # CPU/GPU/NPU plugins + TBB) out of the matching-ABI Python
      # wheel.  Same trick deploy/Dockerfile stage 2b uses.
      - name: stage ONNX Runtime + OpenVINO libs
        run: |
          set -euo pipefail
          python3 -m pip install --target /tmp/ovwheel \
            "onnxruntime-openvino==${ORT_VERSION}"
          mkdir -p stage/lib/onnxruntime
          cp -aP /tmp/ovwheel/onnxruntime/capi/*.so* stage/lib/onnxruntime/
          # The ort crate dlopens libonnxruntime.so (unversioned);
          # the wheel only ships the .so.${ORT_VERSION} soname.
          if [ ! -e "stage/lib/onnxruntime/libonnxruntime.so" ]; then
            ln -s "libonnxruntime.so.${ORT_VERSION}" \
                  "stage/lib/onnxruntime/libonnxruntime.so"
          fi

      - name: assemble release tree
        run: |
          set -euo pipefail
          R="stage"
          mkdir -p "$R/bin" "$R/share/ui" "$R/share/models" \
                   "$R/etc-templates/tiers" "$R/etc-templates/systemd" \
                   "$R/scripts/lib"

          install -m 0755 target/release/nexus-engine "$R/bin/"
          install -m 0755 target/release/nexus-probe  "$R/bin/"
          install -m 0755 target/release/nexus-doctor "$R/bin/"

          cp -a ui/dist/. "$R/share/ui/"
          cp -a models/yolo26n_dynamic.onnx \
                models/yolo_world_v2_s.onnx \
                models/yoloe26_s.onnx \
                models/models-manifest.json "$R/share/models/"

          cp config/nexus.example.toml   "$R/etc-templates/nexus.example.toml"
          cp config/tiers/t10.toml       "$R/etc-templates/tiers/"
          cp config/tiers/t24.toml       "$R/etc-templates/tiers/"
          cp config/tiers/t36.toml       "$R/etc-templates/tiers/"
          cp config/tiers/t36s.toml      "$R/etc-templates/tiers/"
          cp config/tiers/t64.toml       "$R/etc-templates/tiers/"

          cp deploy/systemd/nexus-engine.service \
             "$R/etc-templates/systemd/nexus-engine.service"

          cp scripts/install.sh   "$R/scripts/"
          cp scripts/uninstall.sh "$R/scripts/"
          cp scripts/lib/install-common.sh "$R/scripts/lib/"
          chmod +x "$R/scripts/install.sh" "$R/scripts/uninstall.sh"

          echo "$TAG" > "$R/VERSION"

          echo "--- staged tree ---"
          find "$R" -maxdepth 3 -type f | sort | head -40
          echo "--- size ---"
          du -sh "$R"

      - name: write MANIFEST.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, stat
          root = "stage"
          files = []
          for dp, _, fns in os.walk(root):
              for fn in fns:
                  if fn in ("MANIFEST.json",):
                      continue
                  p = os.path.join(dp, fn)
                  rel = os.path.relpath(p, root)
                  h = hashlib.sha256()
                  with open(p, "rb") as f:
                      for chunk in iter(lambda: f.read(1 << 20), b""):
                          h.update(chunk)
                  st = os.stat(p)
                  files.append({
                      "path":   rel,
                      "sha256": h.hexdigest(),
                      "size":   st.st_size,
                      "mode":   stat.S_IMODE(st.st_mode),
                  })
          files.sort(key=lambda e: e["path"])
          with open(os.path.join(root, "VERSION")) as f:
              version = f.read().strip()
          manifest = {
              "version":     version,
              "files":       files,
              "file_count":  len(files),
              "total_bytes": sum(e["size"] for e in files),
          }
          with open(os.path.join(root, "MANIFEST.json"), "w") as f:
              json.dump(manifest, f, indent=2, sort_keys=True)
              f.write("\n")
          print(f"manifest: {len(files)} files, "
                f"{manifest['total_bytes']/1e6:.1f} MB")
          PY

      - name: package tarball
        id: pack
        run: |
          set -euo pipefail
          name="nexus-edge-${TAG}-linux-x86_64"
          # Rename stage/ -> <name>/ so the tarball has a sensible
          # top-level directory; tar's --transform would also work
          # but a mv is harder to misread.
          mv stage "$name"
          tar -czf "${name}.tar.gz" "$name"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          ls -lh "${name}.tar.gz" "${name}.tar.gz.sha256"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: attach assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.pack.outputs.name }}
        run: |
          set -euo pipefail
          # --clobber so a workflow re-run replaces existing assets
          # instead of failing.  The boostrap script we ship as
          # `install.sh` is the same scripts/bootstrap.sh checked
          # into the repo; we rename on upload so the operator-facing
          # URL is the obvious one.
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            "${NAME}.tar.gz" \
            "${NAME}.tar.gz.sha256"
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            "scripts/bootstrap.sh#install.sh"
